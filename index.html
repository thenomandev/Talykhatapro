<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>tallybook</title>

  <meta name="theme-color" content="#c8ab62" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="ledger.css" />
  <link rel="stylesheet" href="form.css" />

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="app">

<section id="homeScreen" class="screen active">
<div class="gold-home-engine">
  <div class="gold-fixed-top">
    <div class="gold-header-top">
      <button class="gold-business-pill">
        <span class="gold-crown"><i class="fa-solid fa-crown"></i></span>
        <span class="gold-biz-name">আমার ব্যবসা</span>
        <span class="gold-chevron-down"><i class="fa-solid fa-chevron-down"></i></span>
      </button>
      <div class="gold-action-icons">
        <button class="gold-top-icon"><i class="fa-solid fa-file-pdf"></i></button>
        <button class="gold-top-icon"><i class="fa-solid fa-gear"></i></button>
      </div>
    </div>

    <div class="gold-dashboard-card">
      <div class="gold-dash-row">
        <div class="gold-dash-col">
          <div class="gold-dash-val receive" id="totalReceive">০.০০</div>
          <div class="gold-dash-lbl">পাবো</div>
        </div>
        <div class="gold-dash-divider"></div>
        <div class="gold-dash-col">
          <div class="gold-dash-val give" id="totalGive">০.০০</div>
          <div class="gold-dash-lbl">দেবো</div>
        </div>
      </div>
    </div>

    <div class="gold-report-banner">
      <span class="gold-report-text"><i class="fa-solid fa-chart-pie"></i> রিপোর্ট দেখুন</span>
      <span class="gold-report-arrow"><i class="fa-solid fa-chevron-right"></i></span>
    </div>
  </div>

  <div class="gold-customer-section">
    <div class="gold-customer-header">
      কাস্টমার <span id="customerCount">০</span>
    </div>
    <div id="customerList" class="gold-customer-list"></div>
  </div>

  <div class="gold-sticky-bottom">
    <div class="gold-search-wrapper">
      <span class="gold-search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
      <input type="text" id="searchInput" placeholder="কাস্টমার খুঁজুন..." />
    </div>
    <button class="gold-add-cust-btn" id="openCustomerModal">
      <span class="gold-plus-circle"><i class="fa-solid fa-user-plus"></i></span>
      নতুন কাস্টমার যোগ করুন
    </button>
  </div>
</div>
</section>

<section id="customerFormScreen" class="screen">
  <div class="simple-header">
    <button class="back-btn" id="backFromCustomerForm"><i class="fa-solid fa-arrow-left"></i></button>
    <h2 id="customerFormTitle">নতুন গ্রাহক যোগ করুন</h2>
  </div>
  <div class="form-scroll-body">
    <div class="input-item">
      <div class="premium-field-group no-icon">
        <input id="customerName" type="text" autocomplete="off" />
        <label class="floating-label">নাম লিখুন</label>
      </div>
    </div>
    <div class="input-item">
      <div class="premium-field-group no-icon">
        <input id="customerPhone" type="tel" autocomplete="off" />
        <label class="floating-label">মোবাইল নম্বর লিখুন</label>
      </div>
    </div>
    <div class="input-item" id="openingBalContainer">
      <div class="premium-field-group">
        <span class="premium-icon">৳</span>
        <input id="customerOpening" type="text" inputmode="none" class="money-input" />
        <label class="floating-label">ওপেনিং ব্যালেন্স (ঐচ্ছিক)</label>
      </div>
    </div>
    <button class="submit-btn" id="saveCustomerBtn">সংরক্ষণ করুন</button>
  </div>
</section>

<section id="ledgerScreen" class="screen">
  <div class="simple-header">
    <button class="back-btn" id="backToHome"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="ledger-user">
      <div class="avatar" id="ledgerAvatar"></div>
      <div>
        <h2 id="ledgerName" style="margin-left:0; font-size:16px;"></h2>
        <div class="ledger-status-label" id="ledgerBalanceLabel"></div>
      </div>
    </div>
    <button class="more-btn" id="menuBtn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
    <div class="dropdown-menu" id="dropdownMenu">
      <button id="editCustomerBtn" style="color: #333;"><i class="fa-solid fa-user-pen"></i> কাস্টমার এডিট</button>
      <button id="deleteCustomerBtn"><i class="fa-solid fa-user-xmark"></i> কাস্টমার ডিলিট</button>
    </div>
  </div>

  <div class="ledger-action-bar">
    <button class="ledger-bar-btn" id="reportViewBtn"><i class="fa-solid fa-file-pdf"></i> স্টেটমেন্ট</button>
    <button class="ledger-bar-btn" id="reminderBtn"><i class="fa-solid fa-bell"></i> তাগাদা</button>
    <button class="ledger-bar-btn"><i class="fa-solid fa-message"></i> এসএমএস</button>
  </div>

  <div class="ledger-list-header">
    <div>বিবরণ</div>
    <div style="text-align:right; color:#c62828;">দিলাম (বেচা)</div>
    <div style="text-align:right; color:#2e7d32;">পেলাম</div>
  </div>

  <div class="premium-bottom-dock">
    <div class="dock-row">
      <div class="txn-box">
        <div class="premium-field-group" id="moneyGroup">
          <span class="premium-icon">৳</span>
          <input id="txnAmount" class="money-input" type="text" inputmode="none" />
          <label class="floating-label" id="moneyLabel">টাকা লিখুন</label>
        </div>
      </div>
      <div class="txn-note-box">
        <div class="premium-field-group">
          <span class="premium-icon"><i class="fa-solid fa-file-lines"></i></span>
          <input id="txnNote" type="text" autocomplete="off" />
          <label class="floating-label">বিবরণ লিখুন</label>
        </div>
      </div>
    </div>
    <div class="dock-buttons">
      <button class="premium-action-btn give-btn" id="giveSubmitBtn" disabled>দিলাম / বেচা</button>
      <button class="premium-action-btn receive-btn" id="receiveSubmitBtn" disabled>পেলাম</button>
    </div>
  </div>

  <div class="report-view-screen" id="reportViewScreen" style="display:none;">
    <div class="report-header-actions">
      <button class="report-back-btn" id="reportBackBtn"><i class="fa-solid fa-arrow-left"></i> ব্যাক</button>
      <button class="report-download-btn" id="downloadPdfBtn"><i class="fa-solid fa-file-arrow-down"></i> PDF ডাউনলোড</button>
    </div>
    <div class="share-section">
      <span>লেনদেন রিপোর্ট শেয়ার করুন</span>
      <label class="switch">
        <input type="checkbox" id="shareToggle">
        <span class="slider round"></span>
      </label>
    </div>
    <div class="rep-table" id="reportTableBody"></div>
    <div class="total-footer">
      <div class="total-label">মোট</div>
      <div class="total-gave" id="reportTotalGave">০.০০</div>
      <div class="total-got" id="reportTotalGot">০.০০</div>
    </div>
  </div>

  <div style="display:none;" id="ledgerTopBalance">0</div>
  <div id="transactionList" class="transaction-list"></div>
</section>

</div>

<div id="inlineCalculator" class="inline-calculator">
  <button class="calc-key action-key" data-key="AC">AC</button>
  <button class="calc-key action-key backspace-key" data-key="BACK"><i class="fa-solid fa-backspace"></i></button>
  <button class="calc-key action-key" data-key="%">%</button>
  <button class="calc-key operator-key" data-key="÷">÷</button>

  <button class="calc-key" data-key="7">7</button>
  <button class="calc-key" data-key="8">8</button>
  <button class="calc-key" data-key="9">9</button>
  <button class="calc-key operator-key" data-key="×">×</button>

  <button class="calc-key" data-key="4">4</button>
  <button class="calc-key" data-key="5">5</button>
  <button class="calc-key" data-key="6">6</button>
  <button class="calc-key operator-key" data-key="-">−</button>

  <button class="calc-key" data-key="1">1</button>
  <button class="calc-key" data-key="2">2</button>
  <button class="calc-key" data-key="3">3</button>
  <button class="calc-key operator-key" data-key="+">+</button>

  <button class="calc-key" data-key="0">0</button>
  <button class="calc-key" data-key=".">.</button>
  <button class="calc-key calc-equal" data-key="=">=</button>
</div>

<script src="db.js"></script>
<script src="utils.js"></script>
<script src="app.js"></script>
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
