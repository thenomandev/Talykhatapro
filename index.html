<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>tallybook</title>

  <meta name="theme-color" content="#c8ab62" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="ledger.css" />
  <link rel="stylesheet" href="form.css" />
  <link rel="stylesheet" href="global-ui.css" />

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="app">

<section id="homeScreen" class="screen active">

<div class="gold-home-engine">

  <!-- LAYER 1 FIXED -->
  <div class="gold-fixed-top">

    <div class="gold-header-top">

      <button class="gold-business-pill">
        <span class="gold-crown">
          <i class="fa-solid fa-crown"></i>
        </span>

        <span id="topBusinessName">Noman</span>

        <i class="fa-solid fa-chevron-down"></i>
      </button>

      <div class="gold-top-tools">

        <button class="gold-tool-btn">
          <i class="fa-regular fa-envelope"></i>
          <span>ইনবক্স</span>
        </button>

        <button class="gold-tool-btn">
          <i class="fa-regular fa-circle-question"></i>
          <span>হেল্প</span>
        </button>

      </div>

    </div>

    <div class="gold-trial-text">
      গোল্ড (ট্রায়াল)
    </div>

    <div class="gold-app-panel">

      <section class="gold-feature-grid">

        <button>
          <i class="fa-solid fa-book-open"></i>
          <span>মাল্টি ব্যবসা</span>
        </button>

        <button>
          <i class="fa-solid fa-cube"></i>
          <span>স্টক হিসাব</span>
        </button>

        <button>
          <i class="fa-regular fa-note-sticky"></i>
          <span>ব্যবসার নোট</span>
        </button>

        <button>
          <i class="fa-regular fa-bell"></i>
          <span>গ্রুপ তাগাদা</span>
        </button>

<button>
          <i class="fa-solid fa-qrcode"></i>
          <span>QR কোড</span>
        </button>

        <button>
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <span>ডাটা ব্যাকআপ</span>
        </button>

        <button>
          <i class="fa-regular fa-message"></i>
          <span>টালি-মেসেজ</span>
        </button>

        <button>
          <i class="fa-regular fa-inbox"></i>
          <span>ক্যাশবক্স</span>
        </button>

      </section>

    </div>

  </div>

  <!-- MAIN WHITE SCROLL CONTAINER -->
<div class="gold-main-scroll">

  <div class="gold-summary-layer">

    <div class="gold-summary-card">

      <div class="gold-sum-box">
        <div id="totalReceive" class="receive">০</div>
        <small>মোট পাবো</small>
      </div>

      <div class="gold-sum-divider"></div>

      <div class="gold-sum-box">
        <div id="totalGive" class="give">০</div>
        <small>মোট দেবো</small>
      </div>

    </div>

  </div>

  <div class="gold-search-block">

      <div class="gold-search-box">
        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          id="searchInput"
          type="text"
          placeholder="খোঁজ"
        />
      </div>

      <button id="filterBtn" class="gold-round-btn">
        <i class="fa-solid fa-sliders"></i>
      </button>

      <button id="downloadBtn" class="gold-round-btn">
        <i class="fa-solid fa-download"></i>
      </button>

    </div>

<div class="gold-customer-header">
      কাস্টমার <span id="customerCount">০</span>
    </div>

    <div id="customerList" class="gold-customer-list"></div>

  </div>

  <button id="openCustomerModal" class="gold-fab">
    <i class="fa-solid fa-user-plus"></i>
  </button>

</div>

</section>

<!-- CUSTOMER FORM -->
<section id="customerFormScreen" class="screen">

  <header class="simple-header premium-customer-header">
    <button id="backFromCustomerForm" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </button>

    <h2 id="customerFormTitle">নতুন কাস্টমার/সাপ্লায়ার</h2>
  </header>

  <div class="premium-customer-form-body">

    <div class="customer-type-row">

      <div class="avatar-upload-wrap">
        <div id="customerAvatarCircle" class="customer-avatar-circle">
          <i id="customerAvatarIcon" class="fa-solid fa-user"></i>
          <img id="customerAvatarPreview" class="customer-avatar-preview" />
        </div>

        <button id="openAvatarPickerBtn" class="avatar-camera-btn">
          <i class="fa-solid fa-camera"></i>
        </button>

        <input type="file" id="customerCameraInput" accept="image/*" capture="environment" hidden>
        <input type="file" id="customerGalleryInput" accept="image/*" hidden>
      </div>

      <div class="customer-type-toggle">

        <button id="customerTypeCustomer" class="type-toggle-btn active" data-type="customer">
          <span class="type-radio-dot"></span>
          কাস্টমার
        </button>

        <button id="customerTypeSupplier" class="type-toggle-btn" data-type="supplier">
          <span class="type-radio-dot"></span>
          সাপ্লায়ার
        </button>

      </div>

    </div>

    <button id="importContactBtn" class="import-contact-btn">
      <i class="fa-solid fa-address-book"></i>
      ফোনবুক থেকে যোগ করি
    </button>

    <div class="premium-input-box" id="customerNameBox">
      <i class="fa-regular fa-user premium-input-icon" id="customerNameIcon"></i>
      <label id="customerNameLabel" class="floating-label">নাম</label>
      <input id="customerName" type="text" autocomplete="off">
<div id="customerNameWarning" style="display:none;margin-right:16px;color:#b91c1c;font-size:28px;">
⚠
</div>
    </div>

<div id="customerNameError" style="display:none;color:#b91c1c;font-size:13px;margin:-10px 0 14px 4px;">
নাম ৩ থেকে ৩৫ অক্ষরের মধ্যে হতে হবে।
</div>

<div class="premium-input-box" id="customerPhoneBox">

    
      <i class="fa-solid fa-phone premium-input-icon" id="customerPhoneIcon"></i>
      <label id="customerPhoneLabel" class="floating-label">মোবাইল নম্বর</label>
      <input id="customerPhone" type="tel" autocomplete="off">
    </div>

    <div class="premium-input-box" id="openingBalContainer">
      <span class="premium-taka">৳</span>
      <label id="customerOpeningLabel" class="floating-label">পূর্বের বাকি (জের)</label>
      <input id="customerOpening" type="text" inputmode="none" readonly class="money-input">
    </div>

    <div class="customer-extra-actions">

      <button id="customerDateBtn" class="customer-mini-pill">
        <i class="fa-regular fa-calendar"></i>
        <span id="customerDateText">আজ</span>
      </button>

      <input type="date" id="customerDatePicker" hidden>

      <button id="customerAttachPhotoBtn" class="customer-mini-pill">
        <i class="fa-solid fa-camera"></i>
        ছবি
      </button>

      <input type="file" id="customerAttachPhotoInput" accept="image/*" capture="environment" hidden>

    </div>

  </div>

  <div id="customerSaveFooter" class="premium-save-footer">
    <button id="saveCustomerBtn" class="premium-save-btn">
      নিশ্চিত
    </button>
  </div>

  <div id="customerSuccessOverlay" class="customer-success-overlay">
    <div class="customer-success-box">
      <div class="customer-success-check">
        <i class="fa-solid fa-check"></i>
      </div>
      <p id="customerSuccessText"></p>
    </div>
  </div>

  <div id="avatarPickerBackdrop" class="avatar-picker-backdrop"></div>

  <div id="avatarPickerSheet" class="avatar-picker-sheet">

    <div class="sheet-handle"></div>

    <button id="pickCameraBtn" class="sheet-action-btn">
      <i class="fa-solid fa-camera"></i>
      ছবি তুলুন
    </button>

    <button id="pickGalleryBtn" class="sheet-action-btn">
      <i class="fa-regular fa-image"></i>
      গ্যালারি থেকে নিন
    </button>

  </div>

</section>

<!-- LEDGER -->
<section id="ledgerScreen" class="screen">

  <header class="simple-header">
    <button id="backToHome" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </button>

    <div class="ledger-user">
      <div id="ledgerAvatar" class="avatar">A</div>

      <div class="user-info">
        <h2 id="ledgerName">Customer</h2>
      </div>
    </div>

    <button id="deleteCustomerBtn" class="more-btn">
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </button>

    <div id="threeDotMenu" class="dropdown-menu">
      <div class="menu-item" id="optTagada">
        <i class="fa-regular fa-bell"></i> তাগাদা পাঠাই
      </div>

      <div class="menu-item" id="optReport">
        <i class="fa-regular fa-file-pdf"></i> রিপোর্ট
      </div>

      <div class="menu-item" id="optEdit">
        <i class="fa-regular fa-pen-to-square"></i> এডিট
      </div>

      <div class="menu-item" id="optDelete" style="color:#c62828;">
        <i class="fa-regular fa-trash-can"></i> ডিলিট
      </div>
    </div>
  </header>

  <div class="status-bar">
    <div class="status-left">
      <span id="ledgerBalanceLabel">পাবো</span>
      <span id="ledgerBalance">৳ ০</span>
    </div>

    <div class="status-right" id="liveTimeCounter">(এইমাত্র)</div>
  </div>

  <div class="transaction-form" id="ledgerFormContainer">

    <div class="txn-row">

      <div class="txn-box">
        <span class="taka-icon">৳</span>
        <input id="txnGive" type="text" inputmode="none" readonly placeholder="দিলাম/বেচা" class="money-input" />
      </div>

      <div class="txn-box">
        <span class="taka-icon">৳</span>
        <input id="txnReceive" type="text" inputmode="none" readonly placeholder="পেলাম" class="money-input" />
      </div>

    </div>

    <div class="txn-note-box">
      <i class="fa-regular fa-file-lines desc-icon"></i>
      <input id="txnNote" type="text" placeholder="বিবরণ" />
    </div>

    <div class="txn-action-row">
      <button type="button" class="date-pill" id="txnDateBtn">📅 আজ</button>
      <input type="date" id="txnDate" hidden>

      <button type="button" class="photo-pill">
        <i class="fa-solid fa-camera"></i> ছবি
      </button>
    </div>

    <div class="footer-container">
      <button id="saveTxnBtn" class="primary-btn">নিশ্চিত</button>
    </div>

  </div>

  <div id="reportViewContainer" class="report-view-screen" style="display:none;">
    <div class="report-header-actions">

      <button id="closeReportBtn" class="report-back-btn">
        <i class="fa-solid fa-arrow-left"></i> রিপোর্ট বন্ধ করুন
      </button>

      <button class="report-download-btn">
        <i class="fa-solid fa-download"></i> ডাউনলোড
      </button>

    </div>

    <div class="share-section">
      <span>রিপোর্ট শেয়ার</span>

      <label class="switch">
        <input type="checkbox" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="table-header">
      <div>লেনদেনের বিবরণ</div>
      <div style="text-align:center;">দিলাম</div>
      <div style="text-align:right;padding-right:15px;">পেলাম</div>
    </div>

    <div id="reportTxnList"></div>

    <div class="total-footer">
      <div class="total-label">মোট</div>
      <div class="total-gave" id="reportTotalGave">০.০০</div>
      <div class="total-got" id="reportTotalGot">০.০০</div>
    </div>
  </div>

  <div style="display:none;" id="ledgerTopBalance">০</div>
  <div id="transactionList" class="transaction-list"></div>

</section>

</div>

<div id="inlineCalculator" class="inline-calculator">
  <!-- Row 1 -->
  <button class="calc-key action-key" data-key="AC">AC</button>
  <button class="calc-key action-key backspace-key" data-key="BACK"><i class="fa-solid fa-backspace"></i></button>
  <button class="calc-key action-key" data-key="%">%</button>
  <button class="calc-key operator-key" data-key="÷">÷</button>

  <!-- Row 2 -->
  <button class="calc-key" data-key="7">7</button>
  <button class="calc-key" data-key="8">8</button>
  <button class="calc-key" data-key="9">9</button>
  <button class="calc-key operator-key" data-key="×">×</button>

  <!-- Row 3 -->
  <button class="calc-key" data-key="4">4</button>
  <button class="calc-key" data-key="5">5</button>
  <button class="calc-key" data-key="6">6</button>
  <button class="calc-key operator-key" data-key="-">−</button>

  <!-- Row 4 -->
  <button class="calc-key" data-key="1">1</button>
  <button class="calc-key" data-key="2">2</button>
  <button class="calc-key" data-key="3">3</button>
  <button class="calc-key operator-key" data-key="+">+</button>

  <!-- Row 5 -->
  <button class="calc-key" data-key="00">00</button>
  <button class="calc-key" data-key="0">0</button>
  <button class="calc-key" data-key=".">.</button>
  <button class="calc-key operator-key equal-key" data-key="=">=</button>
</div>

<script src="db.js"></script>
<script src="utils.js"></script>
<script src="global-ui.js"></script>
<script src="app.js"></script>

</body>
</html>
