<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>তালিখাতা</title>
  <meta name="theme-color" content="#c8102e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="app">

    <section id="homeScreen" class="screen active">
      <header class="topbar red">
        <div class="topbar-row">
          <button class="account-btn">
            <span>M H Noman Khan</span>
            <span>▼</span>
          </button>
          <div class="top-icons">
            <button id="openCustomerModalTop"><i class="fa-solid fa-user-plus"></i></button>
            <button><i class="fa-regular fa-envelope"></i></button>
            <button><i class="fa-regular fa-comment"></i></button>
          </div>
        </div>
        <div class="dashboard-title">ড্যাশবোর্ড</div>
      </header>

      <div class="summary-card">
        <div class="sum-col">
          <strong id="totalReceive" class="receive">০.০০</strong>
          <small>পাবো (মোট)</small>
        </div>
        <div class="sum-divider"></div>
        <div class="sum-col">
          <strong id="totalGive" class="give">০.০০</strong>
          <small>দেবো (মোট)</small>
        </div>
      </div>

      <div class="search-section-row">
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input id="searchInput" type="text" placeholder="খুঁজুন" />
        </div>
        <button class="action-icon-btn"><i class="fa-solid fa-sliders"></i></button>
        <button class="action-icon-btn"><i class="fa-solid fa-download"></i></button>
      </div>

      <div class="quick-summary" style="display: none;"></div>

      <div class="list-title-row">
        <span>গ্রাহক তালিকা (<span id="customerCount">০</span>)</span>
      </div>

      <div id="customerList" class="customer-list"></div>

      <button id="openCustomerModal" class="fab-circle">
        <i class="fa-solid fa-user-plus"></i>
      </button>

      <nav class="bottom-nav">
        <button class="nav-item active">
          <i class="fa-solid fa-house"></i>
          <span>হোম</span>
        </button>
        <button class="nav-item">
          <i class="fa-solid fa-wallet"></i>
          <span>ক্যাশ</span>
        </button>
        <button class="nav-item">
          <i class="fa-solid fa-bell"></i>
          <span>তগাদা</span>
        </button>
        <button class="nav-item">
          <i class="fa-solid fa-bars"></i>
          <span>আরও</span>
        </button>
      </nav>
    </section>

    <section id="customerFormScreen" class="screen">
      <header class="topbar">
        <button id="backFromCustomerForm" class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
        <span id="customerFormTitle" class="title">নতুন গ্রাহক যোগ করুন</span>
      </header>
      <div class="form-container">
        <div class="input-group">
          <label>গ্রাহকের নাম</label>
          <input id="customerName" type="text" placeholder="নাম লিখুন" />
        </div>
        <div class="input-group">
          <label>মোবাইল নম্বর (ঐচ্ছিক)</label>
          <input id="customerPhone" type="tel" placeholder="০১XXXXXXXXX" />
        </div>
        <div id="openingBalContainer" class="input-group">
          <label>শুরুর ব্যালেন্স (ঐচ্ছিক)</label>
          <input id="customerOpening" type="number" placeholder="০.০০" />
        </div>
        <button id="saveCustomerBtn" class="primary-btn">সংরক্ষণ করুন</button>
      </div>
    </section>

    <section id="ledgerScreen" class="screen">
      <header class="topbar red">
        <div class="topbar-row">
          <div class="ledger-header-left">
            <button id="backToHome" class="back-btn" style="color:#fff;"><i class="fa-solid fa-arrow-left"></i></button>
            <div id="ledgerAvatar" class="avatar"></div>
            <div>
              <div id="ledgerName" class="ledger-name"></div>
              <div id="ledgerBalanceLabel" class="ledger-bal-label">পাবো</div>
            </div>
          </div>
          <div id="ledgerBalance" class="ledger-top-bal">৳ ০.০০</div>
        </div>
      </header>

      <div class="ledger-actions">
        <button id="reportBtn" class="action-btn"><i class="fa-solid fa-file-pdf"></i> রিপোর্ট</button>
        <button class="action-btn"><i class="fa-solid fa-phone"></i> কল</button>
        <button class="action-btn"><i class="fa-solid fa-message"></i> এসএমএস</button>
      </div>

      <div style="display:none;" id="ledgerTopBalance">০</div>
      <div id="transactionList" class="transaction-list"></div>

      <div class="ledger-footer">
        <button id="btnGive" class="footer-btn give-btn">দিলাম ৳</button>
        <button id="btnReceive" class="footer-btn receive-btn">পেলাম ৳</button>
      </div>

      <div id="txnModal" class="bottom-sheet" style="display: none;">
        <div class="sheet-header">
          <span id="txnModalTitle" class="sheet-title">আমি পেলাম</span>
          <button id="closeTxnModal" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sheet-body">
          <div class="amount-input-row">
            <span class="currency-label">৳</span>
            <input id="txnAmount" type="number" placeholder="০" autofocus />
          </div>
          <div class="input-group" style="margin-top:15px;">
            <input id="txnNote" type="text" placeholder="বিবরণ লিখুন (ঐচ্ছিক)" />
          </div>
          <div class="date-attach-row">
            <button id="txnDateBtn" class="date-btn">📅 ১৭ মে, ২০২৬</button>
            <button class="attach-btn"><i class="fa-solid fa-camera"></i> ছবি</button>
          </div>
          <button id="saveTxnBtn" class="primary-btn">নিশ্চিত</button>
        </div>
      </div>

      <div id="reportViewContainer" class="report-view-screen" style="display: none;">
        <div class="report-header-actions">
          <button id="closeReportBtn" class="report-back-btn"><i class="fa-solid fa-arrow-left"></i> রিপোর্ট বন্ধ করুন</button>
          <button class="report-download-btn"><i class="fa-solid fa-download"></i> ডাউনলোড</button>
        </div>
        <div class="share-section">
          <span>রিপোর্ট শেয়ার</span>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="table-header">
          <div>লেনদেনের বিবরণ</div>
          <div style="text-align: center;">দিলাম</div>
          <div style="text-align: right; padding-right: 15px;">পেলাম</div>
        </div>
        <div id="reportTxnList"></div>
        <div class="total-footer">
          <div class="total-label">মোট</div>
          <div class="total-gave" id="reportTotalGave">০.০০</div>
          <div class="total-got" id="reportTotalGot">০.০০</div>
        </div>
      </div>
    </section>

  </div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
